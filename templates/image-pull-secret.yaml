# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
# https://external-secrets.io/latest/guides/common-k8s-secret-types/#dockerconfigjson-example
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "idp-portal-deployment.fullname" . }}-image-pull-secret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  refreshInterval: 1h0m0s
  target:
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{"auths":{"{{ `{{ .registry }}` }}":{"username":"{{ `{{ .username }}` }}","password":"{{ `{{ .password }}` }}","auth":"{{ `{{ printf "%s:%s" .username .password | b64enc }}` }}"}}}'
  data:
  - secretKey: registry
    remoteRef:
      key: idp/platform/backstage/image-pull-secret
      property: registry
  - secretKey: username
    remoteRef:
      key: idp/platform/backstage/image-pull-secret
      property: username
  - secretKey: password
    remoteRef:
      key: idp/platform/backstage/image-pull-secret
      property: password
