{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "idp-portal-deployment.serviceAccountName" . }}
  labels:
    {{- include "idp-portal-deployment.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "idp-portal-deployment.fullname" . }}
  labels:
    {{- include "idp-portal-deployment.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - configmaps
      - services
      - limitranges
      - resourcequotas
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: [get, list, watch]
  - apiGroups: [autoscaling]
    resources:
      - horizontalpodautoscalers
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources:
      - ingresses
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources:
      - jobs
      - cronjobs
    verbs: [get, list, watch]
  - apiGroups: [metrics.k8s.io]
    resources:
      - pods
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "idp-portal-deployment.fullname" . }}
  labels:
    {{- include "idp-portal-deployment.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "idp-portal-deployment.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "idp-portal-deployment.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
